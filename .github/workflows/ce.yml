name: Streamtape Upload Test

on:
  workflow_dispatch:

jobs:
  test_upload:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: 🛠️ Create Dummy File
      run: |
        echo "This is a test file for Streamtape upload." > test_video.mp4
        # 生成一个 5MB 的随机测试文件（有的网盘会拒绝 0KB 或是太小的文件）
        dd if=/dev/urandom of=test_video.mp4 bs=1M count=5
        echo "✅ 测试文件 test_video.mp4 已生成，大小 5MB"

    - name: 🚀 Test API and Upload to Streamtape
      env:
        # 读取 GitHub Secrets 中的账号和密钥
        ST_LOGIN: ${{ secrets.ST_LOGIN }}
        ST_KEY: ${{ secrets.ST_KEY }}
      run: |
        echo "🕵️ 第一步：向 Streamtape 官方 API 请求专属上传链接..."
        
        # 1. 请求上传节点 URL
        # 加上 User-Agent 防止被基础的防火墙拦截
        API_RESP=$(curl -s -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" "https://api.streamtape.com/file/ul?login=${ST_LOGIN}&key=${ST_KEY}")
        
        echo "--- 📈 API 返回原始数据 ---"
        echo "$API_RESP"
        echo "----------------------------"
        
        # 2. 用 jq 解析出真正的上传链接
        UPLOAD_URL=$(echo $API_RESP | jq -r '.result.url')
        
        if [ "$UPLOAD_URL" = "null" ] || [ -z "$UPLOAD_URL" ]; then
          echo "❌ 获取上传链接失败！请检查：1. 您的 ST_LOGIN 和 ST_KEY 是否填写正确？ 2. 查看上方 API 返回的信息。"
          exit 1
        fi
        
        echo "✅ 成功获取上传节点: $UPLOAD_URL"
        
        echo "📦 第二步：开始将测试文件推送到专属节点..."
        
        # 3. 将刚刚生成的测试文件推送到该 URL
        UPLOAD_RESP=$(curl -s -F "file=@test_video.mp4" "$UPLOAD_URL")
        
        echo "--- 📈 上传结果返回数据 ---"
        echo "$UPLOAD_RESP"
        echo "---------------------------"
        
        # 4. 判断是否上传成功
        if echo "$UPLOAD_RESP" | grep -q '"status":200'; then
          echo "🎉 恭喜！测试文件上传成功！整个链路已经打通，没有被拦截！"
        else
          echo "❌ 上传失败，请检查上方的返回错误信息。"
          exit 1
        fi
