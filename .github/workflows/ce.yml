name: Quark To Streamtape Express (Ultimate Batch Edition)

on:
  workflow_dispatch:
    inputs:
      video_urls:
        description: '【必填】下载链接 (支持粘贴多个直链或多个 cURL，用空格分隔即可)'
        required: true
        default: ''
      folder_name:
        description: '【可选】在网盘新建的文件夹名称 (留空则传到根目录)'
        required: false
        default: ''

jobs:
  download_and_upload:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: ⚡ Install Pre-compiled Unlocked Aria2 (Instant)
      run: |
        echo "🚀 正在秒级拉取免编译的静态 Aria2-Pro-Core（128 线程全解锁版）..."
        wget -qO aria2.tar.gz "https://github.com/P3TERX/Aria2-Pro-Core/releases/download/1.36.0_2021.08.22/aria2-1.36.0-static-linux-amd64.tar.gz"
        tar -xzf aria2.tar.gz
        sudo mv aria2c /usr/local/bin/aria2c-git
        sudo chmod +x /usr/local/bin/aria2c-git
        echo "✅ 真正的 128 线程解锁版部署完成！"

    - name: Create Python Script File
      run: |
        cat << 'EOF' > script.py
        import os
        import sys
        import re
        import subprocess
        import json
        import urllib.request
        import urllib.parse
        import shlex

        raw_input = os.environ.get('RAW_INPUT', '').strip()
        folder_name = os.environ.get('FOLDER_NAME', '').strip()
        st_login = os.environ['ST_LOGIN']
        st_key = os.environ['ST_KEY']
        
        download_dir = "downloads"
        os.makedirs(download_dir, exist_ok=True)

        print("🕵️ 正在启动 Pre-flight Check，测试当前虚拟机与 Streamtape 的连通性...")
        try:
            api_ping = subprocess.check_output(
                ['curl', '-s', '-m', '10', '-A', 'Mozilla/5.0 (Windows NT 10.0; Win64; x64)', f'https://api.streamtape.com/account/info?login={st_login}&key={st_key}'],
                stderr=subprocess.STDOUT
            ).decode('utf-8')
            
            if "403 Forbidden" in api_ping or "Cloudflare" in api_ping and "error" in api_ping.lower():
                print("❌ 预检失败：检测到 Streamtape 当前正对 GitHub 该节点 IP 进行严厉风控熔断 (403)！")
                sys.exit(1)
            elif "\"status\":200" in api_ping.replace(" ", ""):
                print("✅ 连通性预检通过！")
            else:
                print("⚠️ 预检返回异常，尝试继续...")
        except Exception as e:
            print(f"⚠️ 预检通信出现异常: {e}，尝试继续...")

        # ==========================================
        # 📂 处理文件夹逻辑
        # ==========================================
        target_folder_id = ""
        if folder_name:
            print(f"\n📁 检测到您要求创建文件夹: 【{folder_name}】")
            create_url = f"https://api.streamtape.com/file/createfolder?login={st_login}&key={st_key}&name={urllib.parse.quote(folder_name)}"
            try:
                req = urllib.request.Request(create_url, headers={'User-Agent': 'Mozilla/5.0'})
                with urllib.request.urlopen(req) as response:
                    res_json = json.loads(response.read().decode('utf-8'))
                    if res_json.get('status') == 200 and 'result' in res_json and 'folderid' in res_json['result']:
                        target_folder_id = res_json['result']['folderid']
                        print(f"✅ 文件夹在云端创建成功！专属归档 ID: {target_folder_id}")
                    else:
                        print("⚠️ 创建文件夹失败，将退回至根目录上传。返回：", res_json)
            except Exception as e:
                print(f"⚠️ 创建文件夹异常: {e}，退回根目录。")

        # ==========================================
        # 📥 解析多任务列表
        # ==========================================
        tasks = []
        if "curl " in raw_input.lower():
            # 按 curl 切割多条命令行
            parts = re.split(r'\bcurl\b', raw_input, flags=re.IGNORECASE)
            for p in parts:
                if p.strip():
                    tasks.append("curl " + p.strip())
        else:
            # 纯直链抓取，支持空格、逗号或换行分隔
            tasks = re.findall(r'(https?://[^\s,;|"\'<>]+)', raw_input)
            
        if not tasks:
            print("❌ 错误：无法提取到任何有效的下载链接或 cURL！")
            sys.exit(1)
            
        print(f"\n🚀 智能队列生成完毕！共探测到 {len(tasks)} 个下载任务，开始排队执行...")

        success_count = 0
        fail_count = 0

        for idx, task_input in enumerate(tasks, 1):
            print(f"\n" + "="*60)
            print(f"🎬 正在执行第 {idx} / {len(tasks)} 个任务")
            print("="*60)
            
            # 每次任务前清理工作台，防止冲突
            for f in os.listdir(download_dir):
                os.remove(os.path.join(download_dir, f))
                
            target_url = ""
            aria2_headers = []
            user_provided_name = ""
            
            # --- 智能解析命令 ---
            if task_input.startswith("curl"):
                cleaned_input = task_input.replace('\\\n', ' ').replace('\\\r\n', ' ')
                try:
                    args = shlex.split(cleaned_input)
                    for i in range(len(args)):
                        if args[i] == '-H' or args[i] == '--header':
                            if i + 1 < len(args):
                                h = args[i+1]
                                h_lower = h.lower()
                                if h_lower.startswith("range:") or h_lower.startswith("authority:") or h_lower.startswith(":") or h_lower.startswith("accept-encoding:"):
                                    continue
                                aria2_headers.append(h)
                        elif args[i] == '-b' or args[i] == '--cookie':
                            if i + 1 < len(args):
                                aria2_headers.append(f"Cookie: {args[i+1]}")
                        elif args[i] == '-A' or args[i] == '--user-agent':
                            if i + 1 < len(args):
                                aria2_headers.append(f"User-Agent: {args[i+1]}")
                        elif args[i] == '-o' or args[i] == '--output':
                            if i + 1 < len(args):
                                user_provided_name = args[i+1]
                        elif args[i].startswith('http://') or args[i].startswith('https://'):
                            target_url = args[i]
                except Exception as e:
                    print(f"⚠️ 解析任务 cURL 时遇到问题：{e}。降级处理...")
                    url_match = re.search(r"(https?://[^\s'\"]+)", task_input)
                    if url_match:
                        target_url = url_match.group(1)
            else:
                target_url = task_input
                
            if not target_url:
                print(f"⏭️ 该任务未能提取到有效 URL，已跳过。")
                fail_count += 1
                continue
                
            # --- 智能提取完美中文名 ---
            true_name = user_provided_name
            
            if not true_name:
                parsed_url = urllib.parse.urlparse(target_url)
                qs = urllib.parse.parse_qs(parsed_url.query)
                for k, v in qs.items():
                    if k.lower() == 'response-content-disposition':
                        cd = v[0]
                        m1 = re.search(r"filename\*=UTF-8''([^;&]+)", cd, re.IGNORECASE)
                        if m1:
                            true_name = urllib.parse.unquote(m1.group(1))
                            break
                        m2 = re.search(r'filename="([^"]+)"', cd, re.IGNORECASE)
                        if m2:
                            true_name = urllib.parse.unquote(m2.group(1))
                            break
                            
            if not true_name:
                basename = urllib.parse.unquote(os.path.basename(parsed_url.path))
                if basename and '.' in basename:
                    true_name = basename

            if not true_name:
                true_name = f"Downloaded_Video_Task_{idx}"
                
            valid_exts = ('.mp4', '.mkv', '.avi', '.ts', '.mov', '.flv')
            if not any(true_name.lower().endswith(ext) for ext in valid_exts):
                true_name += '.mp4'
                
            print(f"✨ 成功锁定中文文件名: 【{true_name}】")

            # --- 启动引擎下载 ---
            print("📥 正在启动【Aria2-Pro 静态解锁版】全速冲锋...")
            aria2_cmd = [
                'aria2c-git', '-s', '64', '-x', '64', '--min-split-size=1M', '-k', '1M',
                '-d', download_dir, '--content-disposition-default-utf8=true'
            ]
            
            has_ua = any(h.lower().startswith("user-agent:") for h in aria2_headers)
            if not has_ua:
                aria2_cmd.extend(['--user-agent', 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'])
            
            has_referer = any(h.lower().startswith("referer:") for h in aria2_headers)
            if not has_referer:
                if "aliyundrive.cloud" in target_url or "alipan.com" in target_url:
                    aria2_headers.append("Referer: https://openapi.alipan.com/")
                elif "aliyundrive" in target_url:
                    aria2_headers.append("Referer: https://www.aliyundrive.com/")
                
            for h in aria2_headers:
                aria2_cmd.append(f"--header={h}")
                
            aria2_cmd.append(target_url)
            
            try:
                subprocess.run(aria2_cmd, check=True)
            except Exception as e:
                print(f"❌ 下载崩溃或被封杀: {e}")
                fail_count += 1
                continue

            downloaded_files = [f for f in os.listdir(download_dir) if not f.endswith('.aria2')]
            if not downloaded_files:
                print(f"❌ 任务失败（下载夹为空，可能是该资源失效）！")
                fail_count += 1
                continue
                
            original_name = downloaded_files[0]
            file_path = os.path.join(download_dir, original_name)

            if os.path.getsize(file_path) < 5 * 1024 * 1024:
                file_size = os.path.getsize(file_path)
                print(f"❌ 触发防盗链！（文件过小：{file_size} 字节）")
                fail_count += 1
                continue
                
            # 强制覆盖中文名
            final_path = os.path.join(download_dir, true_name)
            if file_path != final_path:
                os.rename(file_path, final_path)
                file_path = final_path

            file_size_mb = os.path.getsize(file_path) / (1024 * 1024)
            print(f"🎯 极速下载完成！本地大小: {file_size_mb:.2f} MB")

            # --- 自动归档与推送 ---
            api_ul_url = f"https://api.streamtape.com/file/ul?login={st_login}&key={st_key}"
            if target_folder_id:
                api_ul_url += f"&folder={target_folder_id}"
                
            try:
                req = urllib.request.Request(api_ul_url, headers={'User-Agent': 'Mozilla/5.0'})
                with urllib.request.urlopen(req) as response:
                    api_res = json.loads(response.read().decode('utf-8'))
                    
                if api_res.get('status') != 200 or 'result' not in api_res or 'url' not in api_res['result']:
                    print(f"❌ 无法获取上传节点 URL。")
                    fail_count += 1
                    continue
                    
                upload_url = api_res['result']['url']
                print(f"🚀 正在上传至云端节点...")
                
                upload_cmd = ['curl', '-#', '-F', f'file=@{file_path}', upload_url]
                upload_res_raw = subprocess.check_output(upload_cmd).decode('utf-8')
                
                if "status\":200" in upload_res_raw.replace(" ", "") or "files" in upload_res_raw:
                    print(f"🎉 任务 {idx} 《{true_name}》 推送成功！")
                    
                    # 数据库级中文名防御
                    try:
                        up_json = json.loads(upload_res_raw)
                        if up_json.get('status') == 200 and 'result' in up_json and 'id' in up_json['result']:
                            file_id = up_json['result']['id']
                            st_name = up_json['result'].get('name', '')
                            if st_name != true_name:
                                print(f"⚔️ 触发 API 防御：强行将服务器丢失的中文字符重写回来...")
                                rename_url = f"https://api.streamtape.com/file/rename?login={st_login}&key={st_key}&file={file_id}&name={urllib.parse.quote(true_name)}"
                                rename_req = urllib.request.Request(rename_url, headers={'User-Agent': 'Mozilla/5.0'})
                                with urllib.request.urlopen(rename_req) as rename_res:
                                    pass
                    except Exception as e:
                        print(f"⚠️ 中文名覆写失败: {e}")
                    
                    success_count += 1
                else:
                    print(f"⚠️ 任务 {idx} 上传结果疑似异常，请去网页核对。")
                    fail_count += 1
                    
            except Exception as e:
                print(f"❌ 任务 {idx} 推送时断开: {e}")
                fail_count += 1
                
        print("\n" + "*"*60)
        print(f"🏆 全部任务执行完毕！")
        print(f"✅ 成功搬运: {success_count} 个文件")
        print(f"❌ 失败跳过: {fail_count} 个文件")
        print("*"*60)
        
        if fail_count > 0 and success_count == 0:
            sys.exit(1)
        EOF

    - name: Execute Intelligent Sync
      env:
        ST_LOGIN: ${{ secrets.ST_LOGIN }}
        ST_KEY: ${{ secrets.ST_KEY }}
        RAW_INPUT: ${{ github.event.inputs.video_urls }}
        FOLDER_NAME: ${{ github.event.inputs.folder_name }}
      run: python script.py
