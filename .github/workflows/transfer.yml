name: Quark To Streamtape Express (Ultimate Fixed Cache)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: '请输入夸克直链或整段 cURL 下载命令'
        required: true
        default: ''
      video_name:
        description: '给保存的视频起个名字 (带 .mp4 后缀)'
        required: true
        default: 'video.mp4'

jobs:
  download_and_upload:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 【彻底修复核心】：更改缓存 key 为 v3，强制抛弃之前坏掉的旧残留，重新编译干净的解锁版
    - name: Cache Enhanced Aria2
      id: cache-aria2
      uses: actions/cache@v4
      with:
        path: /home/runner/aria2_bin
        key: aria2-enhanced-1.37.0-v3

    # 如果缓存没命中（也就是这一次），会原地重新编译真正解锁了 128 线程的成品
    - name: Compile Unlocked Aria2 From Source (Only run if no cache)
      if: steps.cache-aria2.outputs.cache-hit != 'true'
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc g++ make pkg-config libssl-dev libxml2-dev zlib1g-dev libsqlite3-dev curl jq
        
        echo "🛠️ 正在重新拉取标准 Aria2 源码进行线程限制解锁编译..."
        curl -L -o aria2.tar.gz https://github.com/aria2/aria2/releases/download/release-1.37.0/aria2-1.37.0.tar.gz
        tar -xzf aria2.tar.gz
        cd aria2-1.37.0
        
        echo "🔓 正在解除 16 线程限制，注入 128 线程高并发权限..."
        # 【修改点】：在 1.37.0 中，限制在 OptionHandlerFactory.cc 里，精确替换
        sed -i "s/\"1\", 1, 16, 'x'/\"1\", 1, 128, 'x'/g" src/OptionHandlerFactory.cc
        
        ./configure --without-gnutls --with-openssl
        make -j$(nproc)
        
        mkdir -p /home/runner/aria2_bin
        cp src/aria2c /home/runner/aria2_bin/aria2c-git
        echo "✅ 真正的 128 线程解锁版编译完成，成功打包新缓存！"

    - name: Enable Unlocked Aria2
      run: |
        sudo cp /home/runner/aria2_bin/aria2c-git /usr/local/bin/aria2c-git
        sudo chmod +x /usr/local/bin/aria2c-git
        echo "🚀 真正的解锁版 Aria2 准备就绪！"

    - name: Create Python Script File
      run: |
        cat << 'EOF' > script.py
        import os
        import sys
        import re
        import subprocess
        import json
        import urllib.request

        raw_input = os.environ['RAW_INPUT'].strip()
        video_name = os.environ['VIDEO_NAME'].strip()
        st_login = os.environ['ST_LOGIN']
        st_key = os.environ['ST_KEY']
        
        if not video_name.lower().endswith('.mp4'):
            video_name += '.mp4'

        # ----------------------------------------------------------------
        # 🔍 【第一步】：Streamtape 通信预检 (Pre-flight Check)
        # ----------------------------------------------------------------
        print("🕵️ 正在启动 Pre-flight Check，测试当前虚拟机与 Streamtape 的连通性...")
        try:
            # 引入了正确的 API Key 验证，模拟正常的浏览器请求头
            api_ping = subprocess.check_output(
                ['curl', '-s', '-m', '10', '-A', 'Mozilla/5.0 (Windows NT 10.0; Win64; x64)', f'https://api.streamtape.com/account/info?login={st_login}&key={st_key}'],
                stderr=subprocess.STDOUT
            ).decode('utf-8')
            
            if "403 Forbidden" in api_ping or "Cloudflare" in api_ping and "error" in api_ping.lower():
                print("❌ 预检失败：检测到 Streamtape 当前正对 GitHub 该节点 IP 进行严厉风控熔断 (403)！")
                print("💡 为了防止白费力气，任务已安全终止。请稍后重新运行或更换 Actions 区域。")
                sys.exit(1)
            elif "\"status\":200" in api_ping.replace(" ", ""):
                print("✅ 连通性预检通过！测试通道顺畅，账号密钥验证成功。")
            else:
                print("⚠️ 预检返回状态异常（请检查 ST_LOGIN 和 ST_KEY 是否正确）：")
                print(api_ping)
                sys.exit(1)
        except Exception as e:
            print(f"⚠️ 预检通信出现异常: {e}，尝试继续...")

        # ----------------------------------------------------------------
        # 📥 【第二步】：预检通过后，再去启动 Aria2 下载
        # ----------------------------------------------------------------
        target_url = ""
        cookie_str = ""

        if raw_input.startswith("curl"):
            print("🚀 检测到您输入的是整段 cURL 命令，正在智能提取关键参数...")
            url_match = re.search(r'(https?://[^\s"\']+)', raw_input)
            if url_match:
                target_url = url_match.group(1)
            cookie_match = re.search(r'(?:-b|--cookie)\s+["\']?([^"\']+)["\']?', raw_input)
            if cookie_match:
                cookie_str = cookie_match.group(1)
        else:
            target_url = raw_input

        if not target_url:
            print("❌ 错误：无法从输入中提取到有效的视频 URL 链接！")
            sys.exit(1)

        print("📥 正在启动【自编译解锁版 Aria2】开启 64 线程暴力冲锋...")
        aria2_cmd = [
            'aria2c-git', '-s', '64', '-x', '64', '--min-split-size=1M', '-k', '1M',
            '--user-agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
            '-o', video_name
        ]
        if cookie_str:
            aria2_cmd.append(f'--header=Cookie: {cookie_str}')
            
        aria2_cmd.append(target_url)
        subprocess.run(aria2_cmd, check=True)

        if not os.path.exists(video_name) or os.path.getsize(video_name) < 1024:
            print("❌ 错误：视频文件下载失败！")
            sys.exit(1)

        file_size_mb = os.path.getsize(video_name) / (1024 * 1024)
        print(f"🎯 文件下载完成！本地大小: {file_size_mb:.2f} MB")

        # ----------------------------------------------------------------
        # 📦 【第三步】：获取真实上传节点并推流
        # ----------------------------------------------------------------
        print(f"📦 正在向 Streamtape 官方 API 请求分配专属上传节点...")
        api_url = f"https://api.streamtape.com/file/ul?login={st_login}&key={st_key}"
        
        try:
            req = urllib.request.Request(api_url, headers={'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64)'})
            with urllib.request.urlopen(req) as response:
                api_res = json.loads(response.read().decode('utf-8'))
                
            if api_res.get('status') != 200 or 'result' not in api_res or 'url' not in api_res['result']:
                print("❌ 错误：无法获取上传节点 URL。API 返回：")
                print(api_res)
                sys.exit(1)
                
            upload_url = api_res['result']['url']
            print(f"✅ 成功获取专属节点: {upload_url}")
            
            print(f"🚀 正在全速推送 《{video_name}》 至该节点...")
            upload_cmd = ['curl', '-#', '-F', f'file=@{video_name}', upload_url]
            upload_res_raw = subprocess.check_output(upload_cmd).decode('utf-8')
            
            print("\n--- 📈 Streamtape 接口返回报告 ---")
            print(upload_res_raw)
            print("---------------------------------")
            
            if "status\":200" in upload_res_raw.replace(" ", "") or "files" in upload_res_raw:
                print(f"🎉 恭喜！《{video_name}》已完美跨越限流同步至 Streamtape 空间！")
            else:
                print("⚠️ 接口返回未预期内容，请去后台网页端确认文件是否已在。")
                
        except Exception as e:
            print(f"❌ 传输过程中发生未预期异常: {e}")
            sys.exit(1)
        EOF

    - name: Execute Intelligent Sync
      env:
        ST_LOGIN: ${{ secrets.ST_LOGIN }}
        ST_KEY: ${{ secrets.ST_KEY }} # 已经把 ST_KEY 正式加入环境变量
        RAW_INPUT: ${{ github.event.inputs.video_url }}
        VIDEO_NAME: ${{ github.event.inputs.video_name }}
      run: python script.py
