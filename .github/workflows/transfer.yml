name: Quark To Streamtape Express (Ultimate Web Gateway)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: '请输入夸克直链或整段 cURL 下载命令'
        required: true
        default: ''
      video_name:
        description: '给保存的视频起个名字 (带 .mp4 后缀)'
        required: true
        default: 'video.mp4'

jobs:
  download_and_upload:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 1. 引入缓存，直接复用你上一次编译好的 128 线程 Aria2
    - name: Cache Enhanced Aria2
      id: cache-aria2
      uses: actions/cache@v4
      with:
        path: /home/runner/aria2_bin
        key: aria2-enhanced-1.37.0-v1

    # 2. 如果没缓存才编译，有缓存 1 秒跳过
    - name: Compile Unlocked Aria2 From Source (Only run if no cache)
      if: steps.cache-aria2.outputs.cache-hit != 'true'
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc g++ make pkg-config libssl-dev libxml2-dev zlib1g-dev libsqlite3-dev curl jq
        curl -L -o aria2.tar.gz https://github.com/aria2/aria2/releases/download/release-1.37.0/aria2-1.37.0.tar.gz
        tar -xzf aria2.tar.gz
        cd aria2-1.37.0
        sed -i 's/A_MAX_NUM_CONNECTION_PER_SERVER = 16/A_MAX_NUM_CONNECTION_PER_SERVER = 128/g' src/OptionHandlerImpl.cc
        ./configure --without-gnutls --with-openssl
        make -j$(nproc)
        mkdir -p /home/runner/aria2_bin
        cp src/aria2c /home/runner/aria2_bin/aria2c-git

    - name: Enable Unlocked Aria2
      run: |
        sudo cp /home/runner/aria2_bin/aria2c-git /usr/local/bin/aria2c-git
        sudo chmod +x /usr/local/bin/aria2c-git
        echo "🚀 解锁版 Aria2 准备就绪！"

    - name: Create Python Script File
      run: |
        cat << 'EOF' > script.py
        import os
        import sys
        import re
        import subprocess
        import json

        raw_input = os.environ['RAW_INPUT'].strip()
        video_name = os.environ['VIDEO_NAME'].strip()
        
        if not video_name.lower().endswith('.mp4'):
            video_name += '.mp4'

        target_url = ""
        cookie_str = ""

        if raw_input.startswith("curl"):
            print("🚀 检测到您输入的是整段 cURL 命令，正在智能提取关键参数...")
            url_match = re.search(r'(https?://[^\s"\']+)', raw_input)
            if url_match:
                target_url = url_match.group(1)
            
            cookie_match = re.search(r'(?:-b|--cookie)\s+["\']?([^"\']+)["\']?', raw_input)
            if cookie_match:
                cookie_str = cookie_match.group(1)
        else:
            target_url = raw_input

        if not target_url:
            print("❌ 错误：无法从输入中提取到有效的视频 URL 链接！")
            sys.exit(1)

        print("📥 正在启动【解锁版 Aria2】开启高速下载...")
        aria2_cmd = [
            'aria2c-git', '-s', '64', '-x', '64', '--min-split-size=1M', '-k', '1M',
            '--user-agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
            '-o', video_name
        ]
        if cookie_str:
            aria2_cmd.append(f'--header=Cookie: {cookie_str}')
            
        aria2_cmd.append(target_url)
        subprocess.run(aria2_cmd, check=True)

        if not os.path.exists(video_name) or os.path.getsize(video_name) < 1024:
            print("❌ 错误：视频文件下载失败！")
            sys.exit(1)

        file_size_mb = os.path.getsize(video_name) / (1024 * 1024)
        print(f"🎯 文件下载完成！本地大小: {file_size_mb:.2f} MB")

        # ----------------------------------------------------------------
        # ☁️ 强行切换到零风控的 Web Front-End 网关上传
        # ----------------------------------------------------------------
        st_login = os.environ['ST_LOGIN']
        
        # 组装免动态申请的公共主分发网关
        web_upload_url = f"https://push.streamtape.com/upload-raw?token={st_login}"
        
        print(f"📦 正在通过 Web 绿色通道强推至 Streamtape 存储节点...")
        try:
            # 使用 -# 显示实时推流进度
            upload_cmd = ['curl', '-#', '-F', f'file=@{video_name}', web_upload_url]
            upload_res = subprocess.check_output(upload_cmd).decode('utf-8')
            
            print("\n--- 📈 Streamtape 接口返回报告 ---")
            print(upload_res)
            print("---------------------------------")
            
            if "status\":200" in upload_res or "files" in upload_res:
                print(f"🎉 恭喜！《{video_name}》已完美跨越限流同步至 Streamtape 空间！")
            else:
                print("⚠️ 接口返回未预期内容，请去后台网页端确认文件是否已在。")
                
        except Exception as e:
            print(f"❌ 传输过程中发生未预期异常: {e}")
            sys.exit(1)
        EOF

    - name: Execute Intelligent Sync
      env:
        ST_LOGIN: ${{ secrets.ST_LOGIN }}
        RAW_INPUT: ${{ github.event.inputs.video_url }}
        VIDEO_NAME: ${{ github.event.inputs.video_name }}
      run: python script.py
